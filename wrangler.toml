name = "cookbook"
compatibility_date = "2025-09-01"

# Intentionally no pages_build_output_dir. Adding it makes this file the source
# of truth for Pages production bindings. Wrangler currently serializes the
# Pages AI binding without the required project_id, so every Git deployment then
# replaces the working dashboard binding with an unusable AI = {} binding.
# Cloudflare Pages build settings and production bindings are dashboard-owned;
# this file remains the local-development and D1-migration configuration.

# NOTE: the build command is NOT set here — `build_command` is not a valid
# wrangler.toml field for Pages (wrangler rejects it). Set it in the Cloudflare
# Pages dashboard: Settings → Builds & deployments → Build command =
# "npm ci && npm run build". This is required because docs/css/bundle.css and
# docs/js/bundle.js are gitignored build artifacts (regenerated by
# `npm run build` / scripts/build.js via esbuild); without the build the app
# ships unstyled/JS-less.

# Non-secret local defaults. Production values are mirrored in the Cloudflare
# Pages dashboard. SESSION_SECRET is the only secret (set separately — see the
# note at the bottom). GOOGLE_CLIENT_ID is public by design and already ships in
# the frontend HTML.
# functions/api/auth.js still rejects a literal "replace-me" client id as a
# backstop, so a forgotten placeholder surfaces as 500 server_misconfigured
# rather than silently 401-ing every sign-in.
[vars]
GOOGLE_CLIENT_ID = "143579664794-tv48jb659iadrqqfvb13621qkdfas03k.apps.googleusercontent.com"
ALLOWED_EMAILS = "kaykayyali@gmail.com,gloriakayyali@gmail.com"
SESSION_TTL = "604800"
EXTRACT_MAX_BYTES = "2000000"
EXTRACT_TIMEOUT_MS = "15000"
EXTRACT_RATE_PER_MIN = "10"
NORMALIZE_RATE_PER_MIN = "10"
HOUSEHOLD_ID = "our-home"
HOUSEHOLD_NAME = "Our Home"
HOUSEHOLD_MEMBER_EMAILS = "kaykayyali@gmail.com,gloriakayyali@gmail.com"
HOUSEHOLD_OWNER_EMAIL = "kaykayyali@gmail.com"

# Local Workers AI binding. Production uses the project-scoped AI binding in the
# Cloudflare Pages dashboard; see the pages_build_output_dir warning above.
[ai]
binding = "AI"

# D1 database for local development and migration commands. Production mirrors
# this DB binding in the Cloudflare Pages dashboard. The table is created by the
# migration at docs/superpowers/migrations/0001_community_recipes.sql
# (applied once) AND self-heals via ensureSchema() in functions/_lib/community.js
# on first request, so a missed migration is non-fatal.
[[d1_databases]]
binding = "DB"
database_name = "cookbook"
database_id = "6a9fe6f0-054c-401d-a4d3-bb57f852e2e4"

# Required secret (set via `wrangler pages secret put`, NEVER committed):
#   SESSION_SECRET — >=32 char random string, e.g. `openssl rand -hex 32`
#     local dev: put it in a `.dev.vars` file as SESSION_SECRET="..."
#     production: wrangler pages secret put SESSION_SECRET --project-name cookbook