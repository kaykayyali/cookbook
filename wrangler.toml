name = "cookbook"
pages_build_output_dir = "docs"
compatibility_date = "2025-09-01"

# Non-secret config. SESSION_SECRET is the only secret (set separately — see
# the note at the bottom). GOOGLE_CLIENT_ID is committed here because:
#   - It is public by design (it already ships in the frontend HTML).
#   - Git-connected Pages deploys apply [vars] and DELETE any plain-text env
#     var not listed here, so a dashboard-only GOOGLE_CLIENT_ID would be wiped
#     on every deploy. Listing it in [vars] makes it durable across deploys.
# functions/api/auth.js still rejects a literal "replace-me" client id as a
# backstop, so a forgotten placeholder surfaces as 500 server_misconfigured
# rather than silently 401-ing every sign-in.
[vars]
GOOGLE_CLIENT_ID = "143579664794-tv48jb659iadrqqfvb13621qkdfas03k.apps.googleusercontent.com"
ALLOWED_EMAILS = "kaykayyali@gmail.com,gloriakayyali@gmail.com"
SESSION_TTL = "604800"
EXTRACT_MAX_BYTES = "2000000"
EXTRACT_TIMEOUT_MS = "15000"
EXTRACT_RATE_PER_MIN = "10"

# Workers AI binding — accessible in Pages Functions as env.AI. Configured
# here (not the dashboard) because git-connected deploys apply wrangler.toml
# bindings, same as [vars]. Limited to one AI binding per Pages project.
[ai]
binding = "AI"

# D1 database for the Community feed — accessible in Pages Functions as env.DB.
# Create it once (`npx wrangler d1 create cookbook`) and paste the printed
# database_id below. Git-connected deploys apply this binding from wrangler.toml.
# The table self-creates on first request via ensureSchema() (see
# functions/_lib/community.js), so a manual migration is optional; the SQL is
# also committed at docs/superpowers/migrations/0001_community_recipes.sql.
[[d1_databases]]
binding = "DB"
database_name = "cookbook"
database_id = "REPLACE_WITH_wrangler_d1_create_OUTPUT"

# Required secret (set via `wrangler pages secret put`, NEVER committed):
#   SESSION_SECRET — >=32 char random string, e.g. `openssl rand -hex 32`
#     local dev: put it in a `.dev.vars` file as SESSION_SECRET="..."
#     production: wrangler pages secret put SESSION_SECRET --project-name cookbook